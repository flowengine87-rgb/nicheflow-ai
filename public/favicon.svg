<svg width="32" height="32" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="44" height="44" rx="11" fill="url(#bg)"/>
  <!-- Article lines = content -->
  <rect x="9" y="17" width="15" height="2.8" rx="1.4" fill="white" opacity="0.95"/>
  <rect x="9" y="22" width="11" height="2.8" rx="1.4" fill="white" opacity="0.7"/>
  <rect x="9" y="27" width="13" height="2.8" rx="1.4" fill="white" opacity="0.5"/>
  <!-- Upward arrow = publish/flow -->
  <line x1="31" y1="33" x2="31" y2="21" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <polyline points="27,25 31,20 35,25" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold star = AI -->
  <circle cx="31" cy="13" r="4" fill="#fbbf24"/>
</svg>